version: '3.9'

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: grouppulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-grouppulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-grouppulse}
      POSTGRES_INITDB_ARGS: "-E UTF8"
      # Performance tuning for 2GB allocation
      POSTGRES_SHARED_BUFFERS: 512MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1GB
      POSTGRES_WORK_MEM: 16MB
      POSTGRES_MAINTENANCE_WORK_MEM: 128MB
      POSTGRES_MAX_CONNECTIONS: 100
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grouppulse}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grouppulse-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          memory: 512M

  # Redis cache and queue
  redis:
    image: redis:7-alpine
    container_name: grouppulse-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - grouppulse-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          memory: 256M

  # Telegram bot (aiogram)
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grouppulse-bot
    restart: unless-stopped
    command: python -m src.bot.app
    environment:
      - APP_NAME=${APP_NAME:-GroupPulse}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - BOT_TOKEN=${BOT_TOKEN}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SESSION_ENCRYPTION_KEY=${SESSION_ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - grouppulse-network
    volumes:
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          memory: 256M

  # Userbot workers (Telethon)
  userbot-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grouppulse-userbot
    restart: unless-stopped
    command: python -m src.userbot.worker
    environment:
      - APP_NAME=${APP_NAME:-GroupPulse}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SESSION_ENCRYPTION_KEY=${SESSION_ENCRYPTION_KEY}
      - ACCOUNT_RATE_LIMIT=${ACCOUNT_RATE_LIMIT:-20}
      - DESTINATION_RATE_LIMIT=${DESTINATION_RATE_LIMIT:-5}
      - GLOBAL_RATE_LIMIT=${GLOBAL_RATE_LIMIT:-100}
      - MAX_WORKERS=${MAX_WORKERS:-10}
      - MAX_CONCURRENT_FORWARDS=${MAX_CONCURRENT_FORWARDS:-100}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - grouppulse-network
    volumes:
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
        reservations:
          memory: 512M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  grouppulse-network:
    driver: bridge
